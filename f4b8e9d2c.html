<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>warsaAi — AI for Entrepreneurs</title>
<style>
  :root {
    --bg:        #080808;
    --bg2:       #111111;
    --bg3:       #181818;
    --card:      #141414;
    --border:    rgba(255,255,255,0.07);
    --accent:    #E8A045;
    --accent2:   #C46B1A;
    --violet:    #9B6BFF;
    --white:     #FFFFFF;
    --grey:      #999999;
    --light:     #CCCCCC;
    --radius:    12px;
    --nav-h:     0px;
    --sb-w:      220px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--light);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise'/%3E%3CfeColorMatrix in='noise' type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='%23000' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── SIDEBAR NAV ─── */
  body { padding-left: var(--sb-w); }

  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: var(--sb-w);
    background: #09090b;
    border-right: 1px solid var(--border);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    transition: transform var(--transition);
  }

  #sidebar::-webkit-scrollbar { display: none; }

  /* ── AI logo top ── */
  .sb-top {
    padding: 1.5rem 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }

  .sb-brand-link {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.75rem;
    text-decoration: none;
    width: 100%;
  }

  .sb-logo-full {
    width: 100%;
    display: flex;
    justify-content: center;
    filter: drop-shadow(0 4px 18px rgba(232,160,69,0.25));
  }

  .sb-logo-full svg {
    width: 100%;
    max-width: 162px;
    height: auto;
  }

  .sb-brand-name {
    font-size: 1.1rem; font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--white);
    text-align: center;
  }

  .sb-brand-name span { color: var(--accent); }

  .sb-tagline {
    font-size: 0.62rem; color: var(--grey);
    text-align: center; letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 0.1rem;
  }

  /* ── Nav list ── */
  .sb-nav {
    list-style: none;
    padding: 1rem 0;
    flex: 1;
  }

  .sb-nav li { padding: 0 0.75rem; }

  .sb-link {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    font-size: 0.82rem; font-weight: 600;
    color: var(--grey);
    text-decoration: none;
    transition: background var(--transition), color var(--transition);
    white-space: nowrap;
    position: relative;
  }

  .sb-link:hover { background: rgba(255,255,255,0.05); color: var(--light); }

  .sb-link.active {
    background: rgba(232,160,69,0.1);
    color: var(--accent);
  }

  .sb-link.active::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; border-radius: 0 3px 3px 0;
    background: var(--accent);
    margin-left: -0.75rem;
  }

  .sb-link-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .sb-link.active .sb-link-icon { opacity: 1; }

  h1 { font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 900; color: var(--white); }
  section { padding: 6rem 5%; position: relative; }
</style>
</head>
<body>
  <div id="content-container"></div>
  <p style="text-align: center; padding: 2rem; font-family: Arial, sans-serif; color: #999;">Loading warsaAi...</p>
</body>
</html>
